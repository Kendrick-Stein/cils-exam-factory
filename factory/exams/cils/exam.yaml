# CILS exam structure — levels A1–C1, sections we generate (lettura, strutture, scritta).
# Sources: official dic-2024 papers (analysis/{A2,B1,B2,C1}.md) + Linee guida CILS (analysis/{A1,OVERVIEW}.md).
# confidence: alta = from a dic-2024 official paper; media = from linee guida, counts inferred.
# NOTE: the dic-2024 A2 sample is the Integrazione module; A2 below is the STANDARD adulti module
# (structure from linee guida, conventions from the sample) — hence confidence media.

exam: cils
name: "CILS — Certificazione di Italiano come Lingua Straniera (Università per Stranieri di Siena)"
excluded_sections_note: "Ogni esame CILS reale ha 5 abilità; qui si generano solo lettura, analisi delle strutture e produzione scritta. Ascolto e produzione orale sono esclusi per progetto."

levels:
  A1:
    level_name: "CILS A1 (adulti)"
    confidence: media
    scoring: {per_section_max: 12, per_section_pass: 7, exam_total: 60, exam_pass: 35}
    excluded:
      - {id: ascolto, nome: "Test di ascolto", prove: 2, durata: "~30 minuti", punti: 12}
      - {id: orale, nome: "Test di produzione orale", prove: 2, durata: "~10 minuti", punti: 12}
    sections:
      - id: lettura
        nome: "Test di comprensione della lettura"
        durata: "30 minuti"
        punti: 12
        parole_totali: [300, 400]
        prove:
          - {n: 1, tipo: scelta_multipla_3, items: 4, punti_item: 1, punti: 4,
             testo: {slot: T1, genere: "testo informativo semplice (presentazione di persone/luoghi/servizi)", parole: [100, 140]}}
          - {n: 2, tipo: vero_falso, items: 8, punti_item: 0.5, punti: 4,
             testo: {slot: T2, genere: "testo regolativo/avviso pubblico semplice (orari, regole, dépliant)", parole: [100, 140]}}
          - {n: 3, tipo: abbinamento, items: 4, opzioni: 6, punti_item: 1, punti: 4,
             testo: {slot: T3, genere: "4 micro-testi funzionali (annunci, cartelli, messaggi)", parole: [80, 120]}}
      - id: strutture
        nome: "Test di analisi delle strutture di comunicazione"
        durata: "30 minuti"
        punti: 12
        prove:
          - {n: 1, tipo: cloze_aperto, focus: "articoli determinativi", items: 10, punti_item: 0.4, punti: 4,
             testo: {slot: T4, genere: "breve testo descrittivo quotidiano", parole: [70, 100]}}
          - {n: 2, tipo: cloze_verbi, focus: "presente e passato prossimo di verbi regolari, essere/avere, modali", items: 10, punti_item: 0.4, punti: 4,
             testo: {slot: T5, genere: "breve racconto/e-mail personale", parole: [70, 100]}}
          - {n: 3, tipo: cloze_mc_3, focus: "lessico di base", items: 8, punti_item: 0.5, punti: 4,
             testo: {slot: T6, genere: "breve testo informativo", parole: [70, 100]}}
      - id: scritta
        nome: "Test di produzione scritta"
        durata: "30 minuti"
        punti: 12
        prove:
          - {n: 1, tipo: tema, genere: "breve descrizione (persone, casa, abitudini)", parole: [20, 40], punti: 6}
          - {n: 2, tipo: testo_funzionale, genere: "breve e-mail di richiesta di informazioni o servizi", parole: [15, 30], punti: 6}

  A2:
    level_name: "CILS A2 (adulti)"
    confidence: media
    scoring: {per_section_max: 12, per_section_pass: 7, exam_total: 60, exam_pass: 35}
    excluded:
      - {id: ascolto, nome: "Test di ascolto", prove: 2, durata: "~20 minuti", punti: 12}
      - {id: orale, nome: "Test di produzione orale", prove: 2, durata: "~10 minuti", punti: 12}
    sections:
      - id: lettura
        nome: "Test di comprensione della lettura"
        durata: "40 minuti"
        punti: 12
        parole_totali: [500, 600]
        prove:
          - {n: 1, tipo: scelta_multipla_3, items: 4, punti_item: 1, punti: 4,
             testo: {slot: T1, genere: "breve articolo di giornale (descrizione di persone/cose/avvenimenti)", parole: [180, 240]}}
          - {n: 2, tipo: vero_falso, items: 8, punti_item: 0.5, punti: 4,
             testo: {slot: T2, genere: "testo regolativo (avviso pubblico, istruzioni, dépliant)", parole: [150, 200]}}
          - {n: 3, tipo: abbinamento, items: 6, opzioni: 8, punti_item: 0.667, punti: 4, punti_nota: "4 punti totali, ~0,67 per abbinamento",
             testo: {slot: T3, genere: "6 micro-testi funzionali con titolo (offerte, avvisi, servizi)", parole: [120, 180]}}
      - id: strutture
        nome: "Test di analisi delle strutture di comunicazione"
        durata: "40 minuti"
        punti: 12
        prove:
          - {n: 1, tipo: cloze_aperto, focus: "articoli e preposizioni semplici", items: 10, punti_item: 0.4, punti: 4,
             testo: {slot: T4, genere: "breve testo informativo quotidiano", parole: [90, 130]}}
          - {n: 2, tipo: cloze_verbi, focus: "presente, passato prossimo, imperfetto; irregolari frequenti", items: 10, punti_item: 0.4, punti: 4,
             testo: {slot: T5, genere: "racconto personale/intervista breve", parole: [90, 130]}}
          - {n: 3, tipo: cloze_mc_3, focus: "lessico quotidiano", items: 8, punti_item: 0.5, punti: 4,
             testo: {slot: T6, genere: "breve testo informativo/annuncio", parole: [90, 130]}}
      - id: scritta
        nome: "Test di produzione scritta"
        durata: "40 minuti"
        punti: 12
        prove:
          - {n: 1, tipo: tema, genere: "descrizione di esperienze o luoghi familiari", parole: [40, 60], punti: 6}
          - {n: 2, tipo: testo_funzionale, genere: "lettera/messaggio informale o richiesta di informazioni", parole: [25, 40], punti: 6}

  B1:
    level_name: "CILS UNO — B1"
    confidence: alta
    scoring: {per_section_max: 20, per_section_pass: 11, exam_total: 100, exam_pass: 55}
    excluded:
      - {id: ascolto, nome: "Test di ascolto", prove: 3, durata: "audio-guidato (~30 minuti)", punti: 20}
      - {id: orale, nome: "Test di produzione orale", prove: 2, durata: "2-3 min + 1,5 min", punti: 20}
    sections:
      - id: lettura
        nome: "Test di comprensione della lettura"
        durata: "50 minuti"
        punti: 20
        parole_totali: [800, 1000]
        prove:
          - {n: 1, tipo: scelta_multipla_4, items: 7, punti_item: 1, punti: 7,
             testo: {slot: T1, genere: "testo informativo/human-interest o intervista", parole: [400, 480]}}
          - {n: 2, tipo: vero_falso, items: 14, punti_item: 0.5, punti: 7,
             testo: {slot: T2, genere: "testo regolativo (regolamento, bando, avviso)", parole: [300, 360]}}
          - {n: 3, tipo: ricostruzione, parti: 11, ancore: 1, items: 10, punti_item: 0.6, punti: 6,
             testo: {slot: T3, genere: "testo narrativo/blog (diario di viaggio, racconto)", parole: [250, 300]}}
      - id: strutture
        nome: "Test di analisi delle strutture di comunicazione"
        durata: "1 ora"
        punti: 20
        punti_nota: "punteggio massimo grezzo 24, riportato a 20 (proporzione 20:24, coeff. 0,83)"
        prove:
          - {n: 1, tipo: cloze_aperto, focus: "articoli e preposizioni semplici e articolate", items: 20, punti_item: 0.3, punti: 6,
             testo: {slot: T4, genere: "cronaca leggera/curiosità", parole: [230, 260]}}
          - {n: 2, tipo: cloze_verbi, focus: "presente, passato prossimo, imperfetto, futuro, condizionale", items: 20, punti_item: 0.3, punti: 6,
             testo: {slot: T5, genere: "intervista (domande in grassetto)", parole: [200, 240]}}
          - {n: 3, tipo: cloze_mc_4, focus: "lessico", items: 15, punti_item: 0.4, punti: 6,
             testo: {slot: T6, genere: "annuncio/notizia locale di iniziativa o servizio", parole: [170, 200]}}
          - {n: 4, tipo: situazioni_mc_4, focus: "funzione comunicativa di micro-messaggi", items: 10, punti_item: 0.6, punti: 6,
             testo: {slot: null, genere: "10 micro-messaggi (25-45 parole) composti sul modello di realia autentici", parole: null}}
      - id: scritta
        nome: "Test di produzione scritta"
        durata: "1 ora e 10 minuti"
        punti: 20
        prove:
          - {n: 1, tipo: tema, genere: "descrizione/racconto di esperienza personale", parole: [100, 120], punti: 10,
             criteri: "efficacia comunicativa 4; correttezza morfosintattica 3,5; adeguatezza e ricchezza lessicale 1,5; ortografia e punteggiatura 1"}
          - {n: 2, tipo: testo_funzionale, genere: "e-mail informale con 3 richieste di contenuto", parole: [50, 80], punti: 10,
             criteri: "efficacia comunicativa 3; adeguatezza stilistica 1; correttezza morfosintattica 3,5; adeguatezza e ricchezza lessicale 1,5; ortografia e punteggiatura 1"}

  B2:
    level_name: "CILS DUE — B2"
    confidence: alta
    scoring: {per_section_max: 20, per_section_pass: 11, exam_total: 100, exam_pass: 55}
    excluded:
      - {id: ascolto, nome: "Test di ascolto", prove: 3, durata: "audio-guidato (~30 minuti)", punti: 20}
      - {id: orale, nome: "Test di produzione orale", prove: 2, durata: "2-3 min + ~1,5 min", punti: 20}
    sections:
      - id: lettura
        nome: "Test di comprensione della lettura"
        durata: "50 minuti"
        punti: 20
        parole_totali: [1200, 1400]
        prove:
          - {n: 1, tipo: scelta_multipla_4, items: 7, punti_item: 1, punti: 7,
             testo: {slot: T1, genere: "articolo informativo-divulgativo", parole: [480, 560]}}
          - {n: 2, tipo: vero_falso, items: 14, punti_item: 0.5, punti: 7,
             testo: {slot: T2, genere: "testo regolativo/informativo (bando, regolamento, guida)", parole: [430, 500]}}
          - {n: 3, tipo: ricostruzione, parti: 11, ancore: 1, items: 10, punti_item: 0.6, punti: 6,
             testo: {slot: T3, genere: "testo narrativo (racconto, reportage narrativo)", parole: [350, 420]}}
      - id: strutture
        nome: "Test di analisi delle strutture di comunicazione"
        durata: "1 ora"
        punti: 20
        punti_nota: "punteggio massimo grezzo 24, riportato a 20 (proporzione 20:24)"
        prove:
          - {n: 1, tipo: cloze_aperto, focus: "aggettivi e pronomi (possessivi, relativi, combinati)", items: 20, punti_item: 0.3, punti: 6,
             testo: {slot: T4, genere: "testo informativo/curiosità", parole: [230, 280]}}
          - {n: 2, tipo: cloze_verbi, focus: "indicativo, congiuntivo, condizionale, passiva", items: 20, punti_item: 0.3, punti: 6,
             testo: {slot: T5, genere: "intervista o racconto", parole: [220, 260]}}
          - {n: 3, tipo: cloze_mc_4, focus: "lessico", items: 15, punti_item: 0.4, punti: 6,
             testo: {slot: T6, genere: "annuncio/notizia di servizio o iniziativa", parole: [180, 220]}}
          - {n: 4, tipo: situazioni_mc_4, focus: "funzione comunicativa/pragmatica di micro-messaggi", items: 10, punti_item: 0.6, punti: 6,
             testo: {slot: null, genere: "10 micro-messaggi (25-50 parole) composti sul modello di realia autentici", parole: null}}
      - id: scritta
        nome: "Test di produzione scritta"
        durata: "1 ora e 10 minuti"
        punti: 20
        prove:
          - {n: 1, tipo: tema, genere: "articolo per blog/recensione/testo descrittivo-narrativo", parole: [120, 140], punti: 10,
             criteri: "come B1 prova 1 (efficacia 4; morfosintassi 3,5; lessico 1,5; ortografia 1) — non stampati nel quaderno dic-2024"}
          - {n: 2, tipo: testo_funzionale, genere: "e-mail/lettera formale con 3 richieste di contenuto", parole: [80, 100], punti: 10,
             criteri: "come B1 prova 2 (efficacia 3; stile 1; morfosintassi 3,5; lessico 1,5; ortografia 1) — non stampati nel quaderno dic-2024"}

  C1:
    level_name: "CILS TRE — C1"
    confidence: alta
    scoring: {per_section_max: 20, per_section_pass: 11, exam_total: 100, exam_pass: 55}
    excluded:
      - {id: ascolto, nome: "Test di ascolto", prove: 3, durata: "audio-guidato (~40 minuti)", punti: 20}
      - {id: orale, nome: "Test di produzione orale", prove: 2, durata: "3-4 min + 2-3 min", punti: 20}
    sections:
      - id: lettura
        nome: "Test di comprensione della lettura"
        durata: "1 ora e 10 minuti"
        punti: 20
        parole_totali: [1600, 2000]
        prove:
          - {n: 1, tipo: scelta_multipla_4, items: 7, punti_item: 1, punti: 7,
             testo: {slot: T1, genere: "articolo di argomento scientifico/culturale o testo letterario", parole: [550, 700]}}
          - {n: 2, tipo: vero_falso, items: 14, punti_item: 0.5, punti: 7,
             testo: {slot: T2, genere: "testo regolativo/espositivo complesso (bando, regolamento, guida)", parole: [500, 620]}}
          - {n: 3, tipo: ricostruzione, parti: 16, ancore: 2, items: 14, punti_item: 0.43, punti: 6, punti_nota: "6 punti totali su 14 legami",
             testo: {slot: T3, genere: "testo narrativo/letterario", parole: [420, 520]}}
      - id: strutture
        nome: "Test di analisi delle strutture di comunicazione"
        durata: "1 ora e 15 minuti"
        punti: 20
        punti_nota: "punteggio massimo grezzo 24, riportato a 20 (inferito sul modello B1/B2)"
        prove:
          - {n: 1, tipo: cloze_aperto, focus: "connettivi", items: 20, punti_item: 0.3, punti: 6,
             testo: {slot: T4, genere: "testo espositivo/argomentativo", parole: [250, 300]}}
          - {n: 2, tipo: cloze_verbi, focus: "tutto il sistema verbale (congiuntivi, passato remoto, forme implicite)", items: 20, punti_item: 0.3, punti: 6,
             testo: {slot: T5, genere: "racconto o intervista", parole: [230, 280]}}
          - {n: 3, tipo: cloze_mc_4, focus: "lessico (anche colto/idiomatico)", items: 15, punti_item: 0.4, punti: 6,
             testo: {slot: T6, genere: "articolo informativo", parole: [200, 240]}}
          - {n: 4, tipo: trasformazione_frasi, focus: "riformulazione mantenendo il significato (registro, nominalizzazione, discorso indiretto)", items: 6, punti_item: 1, punti: 6,
             testo: {slot: null, genere: "6 frasi con esempio (0) svolto", parole: null}}
      - id: scritta
        nome: "Test di produzione scritta"
        durata: "1 ora e 30 minuti"
        punti: 20
        prove:
          - {n: 1, tipo: tema, genere: "breve saggio (scelta fra 2 tracce)", scelta: 2, parole: [160, 180], punti: 10,
             criteri: "indicatori ufficiali; a C1 l'efficacia comunicativa esprime coerenza e coesione del testo"}
          - {n: 2, tipo: testo_funzionale, genere: "lettera/e-mail formale (scelta fra 2 tracce)", scelta: 2, parole: [100, 120], punti: 10,
             criteri: "indicatori ufficiali + adeguatezza stilistica al registro formale"}
